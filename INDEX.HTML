<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caderneta de Gastos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg: #141414;
    --surface: #181818;
    --surface-2: #222222;
    --border: #333333;
    --text: #ffffff;
    --text-soft: #b3b3b3;
    --red: #e50914;
    --red-dark: #b20710;
    --income: #3ddc84;
    --gold: #e5b325;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding:28px 16px 64px;
  }

  .book{
    max-width:920px;
    margin:0 auto;
    background:var(--surface);
    border-radius:8px;
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.7);
    position:relative;
    overflow:hidden;
    border:1px solid var(--border);
  }

  .spine{
    position:absolute;
    left:0; top:0; right:0;
    height:5px;
    background: linear-gradient(90deg, var(--red-dark), var(--red));
  }

  .content{
    padding:40px 40px 44px;
  }

  header.masthead{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    border-bottom:1px solid var(--border);
    padding-bottom:16px;
    margin-bottom:28px;
    flex-wrap:wrap;
    gap:12px;
  }

  h1{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:2.6rem;
    letter-spacing:0.03em;
    margin:0;
    color:var(--text);
  }

  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--red);
    margin:0 0 6px;
    font-weight:600;
  }

  .date-stamp{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.8rem;
    color:var(--text-soft);
    border:1px solid var(--border);
    padding:6px 10px;
    border-radius:3px;
  }

  .totals{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
    margin-bottom:34px;
  }
  @media (max-width:640px){ .totals{ grid-template-columns:1fr; } }

  .stamp{
    border-radius:6px;
    padding:16px 18px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-top:3px solid currentColor;
  }
  .stamp .label{
    font-family:'IBM Plex Mono', monospace;
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.12em;
    opacity:0.8;
    display:block;
    margin-bottom:8px;
    color:var(--text-soft);
  }
  .stamp .value{
    font-family:'Bebas Neue', sans-serif;
    font-size:1.9rem;
    letter-spacing:0.02em;
  }
  .stamp.balance{ color:var(--text); }
  .stamp.income{ color:var(--income); }
  .stamp.expense{ color:var(--red); }

  .entry-form{
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:8px;
    padding:20px 22px;
    margin-bottom:34px;
  }
  .entry-form h2{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:1.4rem;
    letter-spacing:0.02em;
    margin:0 0 14px;
    color:var(--red);
  }
  .form-grid{
    display:grid;
    grid-template-columns:1.6fr 1fr 1fr 1fr auto;
    gap:10px;
    align-items:end;
  }
  @media (max-width:760px){ .form-grid{ grid-template-columns:1fr 1fr; } }

  .field label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.65rem;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--text-soft);
    margin-bottom:5px;
  }
  .field input, .field select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--border);
    border-radius:4px;
    background:#0f0f0f;
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:0.88rem;
  }
  .field input:focus, .field select:focus{
    outline:2px solid var(--red);
    outline-offset:1px;
  }

  .type-toggle{
    display:flex;
    border:1px solid var(--border);
    border-radius:4px;
    overflow:hidden;
  }
  .type-toggle button{
    flex:1;
    border:none;
    padding:9px 6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    cursor:pointer;
    background:#0f0f0f;
    color:var(--text-soft);
  }
  .type-toggle button.active[data-type="despesa"]{ background:var(--red); color:#fff; }
  .type-toggle button.active[data-type="receita"]{ background:var(--income); color:#0f0f0f; }

  .add-btn{
    padding:10px 20px;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:4px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.04em;
    cursor:pointer;
    white-space:nowrap;
  }
  .add-btn:hover{ background:var(--red-dark); }
  .add-btn:focus-visible, .type-toggle button:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  .ledger h2{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:1.4rem;
    letter-spacing:0.02em;
    color:var(--red);
    margin:0 0 10px;
  }

  table{
    width:100%;
    border-collapse:collapse;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.85rem;
  }
  thead th{
    text-align:left;
    font-size:0.65rem;
    text-transform:uppercase;
    letter-spacing:0.1em;
    color:var(--text-soft);
    border-bottom:1px solid var(--border);
    padding:6px 8px;
  }
  tbody td{
    padding:10px 8px;
    border-bottom:1px solid var(--border);
    vertical-align:middle;
    color:var(--text);
  }
  tbody tr:hover{ background:rgba(229,9,20,0.08); }
  td.valor{ text-align:right; font-weight:600; }
  td.valor.receita{ color:var(--income); }
  td.valor.despesa{ color:var(--red); }
  td.cat{ color:var(--text-soft); }
  .del-btn{
    background:none;
    border:1px solid var(--border);
    color:var(--text-soft);
    border-radius:3px;
    padding:3px 8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem;
    cursor:pointer;
  }
  .del-btn:hover{ border-color:var(--red); color:var(--red); }

  .empty-row td{
    text-align:center;
    color:var(--text-soft);
    font-family:'Inter', sans-serif;
    padding:26px 8px;
    font-style:italic;
  }

  .breakdown{ margin-top:34px; }
  .breakdown h2{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:1.4rem;
    letter-spacing:0.02em;
    color:var(--red);
    margin:0 0 14px;
  }
  .bar-row{
    display:grid;
    grid-template-columns:120px 1fr 70px;
    gap:10px;
    align-items:center;
    margin-bottom:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
  }
  .bar-track{
    height:9px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:5px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background: linear-gradient(90deg, var(--red-dark), var(--red));
    border-radius:5px;
  }
  .bar-row .amount{ text-align:right; color:var(--text-soft); }

  @media (prefers-reduced-motion: reduce){
    * { transition:none !important; }
  }

  .close-month{
    margin-top:34px;
    background:linear-gradient(135deg, var(--surface-2), #1a0d0e);
    border:1px solid var(--red-dark);
    border-radius:8px;
    padding:22px 24px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
  }
  .close-month .info h2{
    font-family:'Bebas Neue', sans-serif;
    font-weight:400;
    font-size:1.4rem;
    letter-spacing:0.02em;
    color:var(--text);
    margin:0 0 4px;
  }
  .close-month .info p{
    margin:0;
    font-size:0.82rem;
    color:var(--text-soft);
  }
  .close-month .actions{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }
  .close-month input[type="month"]{
    padding:9px 10px;
    border:1px solid var(--border);
    border-radius:4px;
    background:#0f0f0f;
    color:var(--text);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.82rem;
  }
  .pdf-btn{
    padding:11px 20px;
    background:var(--red);
    color:#fff;
    border:none;
    border-radius:4px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.8rem;
    font-weight:600;
    letter-spacing:0.04em;
    cursor:pointer;
    white-space:nowrap;
  }
  .pdf-btn:hover{ background:var(--red-dark); }
  .pdf-btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .pdf-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
</style>
</head>
<body>

<div class="book">
  <div class="spine"></div>
  <div class="content">

    <header class="masthead">
      <div>
        <p class="eyebrow">Livro-caixa pessoal</p>
        <h1>Caderneta de Gastos</h1>
      </div>
      <div class="date-stamp" id="todayStamp"></div>
    </header>

    <section class="totals">
      <div class="stamp balance">
        <span class="label">Saldo</span>
        <span class="value" id="totalBalance">R$ 0,00</span>
      </div>
      <div class="stamp income">
        <span class="label">Receitas</span>
        <span class="value" id="totalIncome">R$ 0,00</span>
      </div>
      <div class="stamp expense">
        <span class="label">Despesas</span>
        <span class="value" id="totalExpense">R$ 0,00</span>
      </div>
    </section>

    <section class="entry-form">
      <h2>Novo lançamento</h2>
      <div class="form-grid">
        <div class="field">
          <label for="descInput">Descrição</label>
          <input type="text" id="descInput" placeholder="Ex: Feira, aluguel, salário...">
        </div>
        <div class="field">
          <label for="catInput">Categoria</label>
          <select id="catInput"></select>
        </div>
        <div class="field">
          <label for="valorInput">Valor (R$)</label>
          <input type="number" id="valorInput" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="field">
          <label for="dataInput">Data</label>
          <input type="date" id="dataInput">
        </div>
        <div class="field">
          <label>Tipo</label>
          <div class="type-toggle">
            <button type="button" data-type="despesa" class="active">Despesa</button>
            <button type="button" data-type="receita">Receita</button>
          </div>
        </div>
      </div>
      <div style="margin-top:12px; text-align:right;">
        <button class="add-btn" id="addBtn">+ Lançar no livro</button>
      </div>
    </section>

    <section class="ledger">
      <h2>Lançamentos</h2>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th style="text-align:right;">Valor</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ledgerBody">
        </tbody>
      </table>
    </section>

    <section class="breakdown" id="breakdownSection">
      <h2>Despesas por categoria</h2>
      <div id="breakdownBody"></div>
    </section>

    <section class="close-month">
      <div class="info">
        <h2>Fechar o mês</h2>
        <p>Gere um extrato em PDF com todos os lançamentos do período selecionado.</p>
      </div>
      <div class="actions">
        <input type="month" id="monthInput">
        <button class="pdf-btn" id="pdfBtn">Gerar extrato em PDF</button>
      </div>
    </section>

  </div>
</div>

<script>
const CATEGORIES = {
  despesa: ["Alimentação","Transporte","Moradia","Lazer","Saúde","Educação","Outros"],
  receita: ["Salário","Freelance","Investimentos","Outros"]
};

const STORAGE_KEY = 'caderneta:transacoes';

let currentType = 'despesa';
let transactions = [];

const descInput = document.getElementById('descInput');
const catInput = document.getElementById('catInput');
const valorInput = document.getElementById('valorInput');
const dataInput = document.getElementById('dataInput');
const addBtn = document.getElementById('addBtn');
const ledgerBody = document.getElementById('ledgerBody');
const breakdownBody = document.getElementById('breakdownBody');
const totalBalanceEl = document.getElementById('totalBalance');
const totalIncomeEl = document.getElementById('totalIncome');
const totalExpenseEl = document.getElementById('totalExpense');

function formatBRL(n){
  return n.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });
}

function formatDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

function populateCategories(){
  catInput.innerHTML = '';
  CATEGORIES[currentType].forEach(c=>{
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    catInput.appendChild(opt);
  });
}

function setType(type){
  currentType = type;
  document.querySelectorAll('.type-toggle button').forEach(b=>{
    b.classList.toggle('active', b.dataset.type === type);
  });
  populateCategories();
}

document.querySelectorAll('.type-toggle button').forEach(b=>{
  b.addEventListener('click', ()=> setType(b.dataset.type));
});

async function loadTransactions(){
  try{
    const result = await window.storage.get(STORAGE_KEY, false);
    transactions = result ? JSON.parse(result.value) : [];
  }catch(e){
    transactions = [];
  }
  render();
}

async function saveTransactions(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(transactions), false);
  }catch(e){
    console.error('Falha ao salvar', e);
  }
}

function addTransaction(){
  const desc = descInput.value.trim();
  const valor = parseFloat(valorInput.value);
  const data = dataInput.value || new Date().toISOString().slice(0,10);
  const categoria = catInput.value;

  if(!desc){ descInput.focus(); return; }
  if(!valor || valor <= 0){ valorInput.focus(); return; }

  transactions.unshift({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    desc, valor, data, categoria, tipo: currentType
  });

  descInput.value = '';
  valorInput.value = '';
  descInput.focus();

  saveTransactions();
  render();
}

function deleteTransaction(id){
  transactions = transactions.filter(t=>t.id !== id);
  saveTransactions();
  render();
}

addBtn.addEventListener('click', addTransaction);
[descInput, valorInput].forEach(el=>{
  el.addEventListener('keydown', e=>{ if(e.key==='Enter') addTransaction(); });
});

function render(){
  let income = 0, expense = 0;
  transactions.forEach(t=>{
    if(t.tipo === 'receita') income += t.valor; else expense += t.valor;
  });
  totalIncomeEl.textContent = formatBRL(income);
  totalExpenseEl.textContent = formatBRL(expense);
  totalBalanceEl.textContent = formatBRL(income - expense);

  ledgerBody.innerHTML = '';
  if(transactions.length === 0){
    ledgerBody.innerHTML = '<tr class="empty-row"><td colspan="5">Nenhum lançamento ainda — comece registrando acima.</td></tr>';
  } else {
    const sorted = [...transactions].sort((a,b)=> b.data.localeCompare(a.data));
    sorted.forEach(t=>{
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${formatDate(t.data)}</td>
        <td>${escapeHtml(t.desc)}</td>
        <td class="cat">${escapeHtml(t.categoria)}</td>
        <td class="valor ${t.tipo}">${t.tipo === 'despesa' ? '-' : '+'} ${formatBRL(t.valor)}</td>
        <td><button class="del-btn" data-id="${t.id}">remover</button></td>
      `;
      ledgerBody.appendChild(tr);
    });
    ledgerBody.querySelectorAll('.del-btn').forEach(btn=>{
      btn.addEventListener('click', ()=> deleteTransaction(btn.dataset.id));
    });
  }

  const byCat = {};
  transactions.filter(t=>t.tipo==='despesa').forEach(t=>{
    byCat[t.categoria] = (byCat[t.categoria]||0) + t.valor;
  });
  const catEntries = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  breakdownBody.innerHTML = '';
  if(catEntries.length === 0){
    breakdownBody.innerHTML = '<p style="font-family:Inter,sans-serif; color:var(--text-soft); font-style:italic;">Sem despesas registradas ainda.</p>';
  } else {
    const max = catEntries[0][1];
    catEntries.forEach(([cat, val])=>{
      const row = document.createElement('div');
      row.className = 'bar-row';
      const pct = Math.max(4, Math.round((val/max)*100));
      row.innerHTML = `
        <span>${escapeHtml(cat)}</span>
        <span class="bar-track"><span class="bar-fill" style="width:${pct}%"></span></span>
        <span class="amount">${formatBRL(val)}</span>
      `;
      breakdownBody.appendChild(row);
    });
  }
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

populateCategories();
dataInput.value = new Date().toISOString().slice(0,10);
document.getElementById('todayStamp').textContent = formatDate(new Date().toISOString().slice(0,10));
loadTransactions();

// ---- Extrato mensal em PDF ----
const monthInput = document.getElementById('monthInput');
const pdfBtn = document.getElementById('pdfBtn');
monthInput.value = new Date().toISOString().slice(0,7);

const MONTH_NAMES = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

pdfBtn.addEventListener('click', generateStatement);

function generateStatement(){
  const monthValue = monthInput.value;
  if(!monthValue){ monthInput.focus(); return; }

  if(!window.jspdf || !window.jspdf.jsPDF){
    alert('A biblioteca de geração de PDF ainda está carregando. Aguarde um instante e tente novamente.');
    return;
  }

  const monthTx = transactions
    .filter(t => t.data.startsWith(monthValue))
    .sort((a,b) => a.data.localeCompare(b.data));

  if(monthTx.length === 0){
    alert(`Não há lançamentos registrados em ${monthLabelFor(monthValue)}.`);
    return;
  }

  try{
    buildStatementPdf(monthValue, monthTx);
  }catch(err){
    console.error('Erro ao gerar extrato:', err);
    alert('Não foi possível gerar o extrato. Detalhe do erro: ' + err.message);
  }
}

function monthLabelFor(monthValue){
  const [year, month] = monthValue.split('-');
  return `${MONTH_NAMES[parseInt(month,10)-1]} de ${year}`;
}

function buildStatementPdf(monthValue, monthTx){
  const monthLabel = monthLabelFor(monthValue);

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'pt', format: 'a4' });
  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();
  const red = [229, 9, 20];
  const dark = [20, 20, 20];
  const gray = [110, 110, 110];

  // marca d'água diagonal
  doc.saveGraphicsState();
  doc.setGState(new doc.GState({ opacity: 0.06 }));
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(70);
  doc.setTextColor(...dark);
  doc.text('CADERNETA DE GASTOS', pageWidth / 2, pageHeight / 2, {
    align: 'center',
    angle: 35
  });
  doc.restoreGraphicsState();

  // faixa vermelha no topo
  doc.setFillColor(...red);
  doc.rect(0, 0, pageWidth, 8, 'F');

  // logo / monograma
  doc.setFillColor(...red);
  doc.roundedRect(40, 26, 30, 30, 6, 6, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(255, 255, 255);
  doc.text('CG', 55, 46, { align: 'center' });

  // cabeçalho
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(20);
  doc.setTextColor(...dark);
  doc.text('CADERNETA DE GASTOS', 82, 44);

  doc.setFont('helvetica', 'normal');
  doc.setFontSize(11);
  doc.setTextColor(...gray);
  doc.text('Extrato mensal detalhado', 82, 60);

  doc.setFont('helvetica', 'bold');
  doc.setFontSize(13);
  doc.setTextColor(...red);
  doc.text(monthLabel.toUpperCase(), pageWidth - 40, 50, { align: 'right' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(...gray);
  doc.text(`Emitido em ${new Date().toLocaleDateString('pt-BR')}`, pageWidth - 40, 66, { align: 'right' });

  doc.setDrawColor(220,220,220);
  doc.line(40, 82, pageWidth - 40, 82);

  // resumo do mês
  let income = 0, expense = 0;
  monthTx.forEach(t => { if(t.tipo === 'receita') income += t.valor; else expense += t.valor; });
  const balance = income - expense;

  const boxY = 98;
  const boxW = (pageWidth - 80 - 24) / 3;
  const summaries = [
    { label: 'RECEITAS', value: income, color: [61, 180, 110] },
    { label: 'DESPESAS', value: expense, color: red },
    { label: 'SALDO DO MÊS', value: balance, color: dark }
  ];
  summaries.forEach((s, i) => {
    const x = 40 + i * (boxW + 12);
    doc.setDrawColor(230,230,230);
    doc.setFillColor(250,250,250);
    doc.roundedRect(x, boxY, boxW, 48, 4, 4, 'FD');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.setTextColor(...gray);
    doc.text(s.label, x + 10, boxY + 16);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.setTextColor(...s.color);
    doc.text(formatBRL(s.value), x + 10, boxY + 34);
  });

  // tabela de lançamentos
  const rows = monthTx.map(t => [
    formatDate(t.data),
    t.desc,
    t.categoria,
    t.tipo === 'receita' ? 'Receita' : 'Despesa',
    (t.tipo === 'despesa' ? '- ' : '+ ') + formatBRL(t.valor)
  ]);

  doc.autoTable({
    startY: boxY + 66,
    head: [['Data', 'Descrição', 'Categoria', 'Tipo', 'Valor']],
    body: rows,
    theme: 'plain',
    styles: { font: 'helvetica', fontSize: 9, cellPadding: 6, textColor: dark },
    headStyles: { fillColor: dark, textColor: [255,255,255], fontStyle: 'bold', fontSize: 8 },
    columnStyles: { 4: { halign: 'right' } },
    alternateRowStyles: { fillColor: [248,248,248] },
    didParseCell: function(data){
      if(data.section === 'body' && data.column.index === 4){
        const isExpense = rows[data.row.index][4].startsWith('-');
        data.cell.styles.textColor = isExpense ? red : [61,180,110];
        data.cell.styles.fontStyle = 'bold';
      }
    },
    didDrawPage: function(){
      doc.saveGraphicsState();
      doc.setGState(new doc.GState({ opacity: 0.06 }));
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(70);
      doc.setTextColor(...dark);
      doc.text('CADERNETA DE GASTOS', pageWidth / 2, pageHeight / 2, {
        align: 'center',
        angle: 35
      });
      doc.restoreGraphicsState();
      doc.setFillColor(...red);
      doc.rect(0, 0, pageWidth, 8, 'F');
    },
    margin: { left: 40, right: 40 }
  });

  // rodapé
  const finalY = doc.lastAutoTable.finalY + 24;
  doc.setDrawColor(220,220,220);
  doc.line(40, finalY, pageWidth - 40, finalY);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...gray);
  doc.text(`${monthTx.length} lançamento(s) neste período · Documento gerado automaticamente pela Caderneta de Gastos`, 40, finalY + 14);

  doc.save(`extrato-${monthValue}.pdf`);
}
</script>
